# Chat App DB Worker - 用户认证 + 聊天
name = "chat-app-db"
main = "chat-app-db-worker.js"
compatibility_date = "2024-01-01"

# 绑定 D1 数据库
[[d1_databases]]
binding = "DB"
database_name = "chat-app-db"
database_id = "46260ff3-1d5a-459a-a8d8-33d329d18176"

# 绑定 KV 存储 (用于管理 token)
[[kv_namespaces]]
binding = "ADMIN_TOKENS"
id = "e5df7fcd479343c0b0f8cbf5e8870854"

# 绑定 KV 存储 (用于图片数据)
[[kv_namespaces]]
binding = "IMAGE_GALLERY"
id = "a7300b1881eb4409957e93b9492379db"
